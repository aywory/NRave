<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>VK Together</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        /* ГЛАВНЫЙ ФИКС ДЛЯ IOS: фиксируем body, чтобы он не прыгал */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            font-family: sans-serif;
            position: fixed;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* 1. ВИДЕО: Приклеиваем к верху */
        .video-fixed-top {
            width: 100%;
            background: #000;
            flex-shrink: 0;
            z-index: 100;
        }

        .video-ratio {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
        }

        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 101;
            text-align: center;
            font-size: 14px;
        }

        /* 2. УПРАВЛЕНИЕ: Компактно под видео */
        .controls {
            display: flex;
            gap: 5px;
            padding: 5px;
            background: #1a1a1a;
            flex-shrink: 0;
        }

        .controls input {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            font-size: 16px;
            /* 16px предотвращает зум */
        }

        .controls button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        /* 3. ЧАТ: Занимает всё оставшееся место */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            background: #121212;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            -webkit-overflow-scrolling: touch;
            /* Плавный скролл для iOS */
        }

        .msg {
            background: #222;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 14px;
            align-self: flex-start;
            max-width: 90%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 5px;
        }

        /* 4. ВВОД СООБЩЕНИЯ: Всегда внизу */
        .chat-footer {
            display: flex;
            gap: 5px;
            padding: 8px;
            background: #1a1a1a;
            flex-shrink: 0;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
        }

        #msgInput {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
            font-size: 16px;
        }

        .btn-send {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 20px;
        }

        /* Фикс для маленьких экранов при открытой клавиатуре */
        @media (max-height: 400px) {
            .video-ratio {
                width: 50%;
                margin: 0 auto;
            }

            .controls {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Блок видео (неподвижный) -->
        <div class="video-fixed-top">
            <div class="video-ratio">
                <div id="mobile-overlay" onclick="activateMobilePlayer()">
                    <div>🍿 Видео готово!<br>Нажми сюда для синхронизации</div>
                </div>
                <div id="vk_player" style="width:100%; height:100%;"></div>
            </div>
            <div class="controls">
                <input type="text" id="vkLink" placeholder="Ссылка на ВК">
                <button onclick="loadVideo()" style="background:#4c75a3; color:white;">Загрузить</button>
                <button onclick="setMeAsHost()" style="background:orange;">Я Хозяин</button>
            </div>
        </div>

        <!-- Чат (скроллится) -->
        <div id="chat"></div>

        <!-- Ввод сообщения (прибит к низу) -->
        <div class="chat-footer">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');

        let player = null;
        let isHost = false;
        let currentVideoId = "";
        let hostActualState = 'pause';

        socket.on('connect', () => {
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            alert("Вы теперь управляете комнатой");
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('vk_player');
            container.innerHTML = '';
            const parts = videoId.split('_');
            const iframe = document.createElement('iframe');
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            container.appendChild(iframe);

            if (!isHost) { document.getElementById('mobile-overlay').style.display = 'flex'; }

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendEvent('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendEvent('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 500);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendEvent(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', {
                roomId, action, time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
            });
        }

        setInterval(() => {
            if (isHost && player) {
                socket.emit('playerEvent', {
                    roomId, action: 'syncTime', time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
                });
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') { initPlayer(data.videoId, data.time); return; }
            if (player) {
                if (data.state === 'play') player.play();
                else if (data.state === 'pause') player.pause();
                let myTime = player.getCurrentTime();
                if (Math.abs(myTime - data.time) > 3) player.seek(data.time);
            }
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
