<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>VK Together</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        /* Блокируем любые прыжки всей страницы */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* 1. ВИДЕО - ПРИБИТО К ВЕРХУ НАМЕРТВО */
        .video-fixed-block {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
            /* Поверх всего */
            background: #000;
        }

        .video-aspect {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
        }

        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
        }

        /* 2. КОНТЕНТ ПОД ВИДЕО (ЧАТ И УПРАВЛЕНИЕ) */
        .scrollable-content {
            position: absolute;
            top: calc(100vw * 0.5625);
            /* Отступ ровно на высоту видео (16:9) */
            left: 0;
            right: 0;
            bottom: 70px;
            /* Оставляем место под ввод сообщения */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Панель управления */
        .controls-row {
            padding: 8px;
            background: #1a1a1a;
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .controls-row input {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            /* Фикс зума iOS */
        }

        .controls-row button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
        }

        /* Чат */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background: #121212;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            background: #2c2c2c;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            align-self: flex-start;
            max-width: 85%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 5px;
        }

        /* Ввод сообщения (прибит к низу) */
        .footer-input {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            padding: 10px;
            box-sizing: border-box;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        #msgInput {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 20px;
            font-size: 16px;
        }

        .btn-send {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Стиль для ПК (чтобы не было на весь экран) */
        @media (min-width: 800px) {

            .video-fixed-block,
            .scrollable-content,
            .footer-input {
                max-width: 800px;
                left: 50%;
                transform: translateX(-50%);
            }

            .video-fixed-block {
                top: 0;
            }

            .scrollable-content {
                top: 450px;
            }

            /* Фиксированная высота для ПК */
        }
    </style>
</head>

<body>

    <!-- ВИДЕО (ВСЕГДА ТУТ) -->
    <div class="video-fixed-block">
        <div class="video-aspect">
            <div id="mobile-overlay" onclick="activateMobilePlayer()">
                <div>🍿 Видео готово!<br>Нажми сюда</div>
            </div>
            <div id="player-target" style="width:100%; height:100%;"></div>
        </div>
        <div class="controls-row">
            <input type="text" id="vkLink" placeholder="Ссылка на ВК">
            <button onclick="loadVideo()" style="background:#4c75a3; color:white;">Загрузить</button>
            <button id="hostBtn" onclick="setMeAsHost()" style="background:#444; color:white;">Я Хозяин</button>
        </div>
    </div>

    <!-- ЧАТ (ПОД ВИДЕО) -->
    <div class="scrollable-content">
        <div id="chat"></div>
    </div>

    <!-- ВВОД (В САМОМ НИЗУ) -->
    <div class="footer-input">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button class="btn-send" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');
        let player = null;
        let isHost = false;
        let currentVideoId = "";
        let hostActualState = 'pause';

        socket.on('connect', () => {
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            document.getElementById('hostBtn').style.background = "orange";
            document.getElementById('hostBtn').style.color = "black";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('player-target');
            const parts = videoId.split('_');
            const iframe = document.createElement('iframe');
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            container.innerHTML = '';
            container.appendChild(iframe);

            if (!isHost) document.getElementById('mobile-overlay').style.display = 'flex';

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendEvent('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendEvent('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 600);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendEvent(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', { roomId, action, time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState });
        }

        setInterval(() => {
            if (isHost && player) {
                socket.emit('playerEvent', { roomId, action: 'syncTime', time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState });
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') {
                if (data.videoId !== currentVideoId) initPlayer(data.videoId, data.time);
                return;
            }
            if (player) {
                if (data.state === 'play') player.play();
                else if (data.state === 'pause') player.pause();
                if (Math.abs(player.getCurrentTime() - data.time) > 3) player.seek(data.time);
            }
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
