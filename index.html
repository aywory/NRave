<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #video-container {
            width: 800px;
            height: 450px;
            background: #000;
            margin-top: 20px;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        #chat {
            width: 800px;
            height: 150px;
            border: 1px solid #444;
            overflow-y: scroll;
            margin-top: 10px;
            padding: 10px;
            background: #222;
        }

        .chat-input {
            width: 800px;
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <h2>Смотрим ВК вместе</h2>

    <div class="controls">
        <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
        <button onclick="loadVideo()">Загрузить видео</button>
    </div>

    <div id="video-container">
        <!-- Сюда вставится плеер ВК -->
        <div id="vk_player"></div>
    </div>

    <div id="chat"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const socket = io('https://nrave.onrender.com');
        const roomId = new URLSearchParams(window.location.search).get('room') || 'main';
        socket.emit('joinRoom', roomId);

        let player;

        // 1. Загрузка видео
        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);

            if (match) {
                const videoId = match[1];
                console.log("ID видео найден:", videoId);
                initPlayer(videoId);

                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'changeVideo',
                    videoId: videoId
                });
            } else {
                alert("Неверная ссылка на видео ВК.");
            }
        }

        // 2. Инициализация плеера и СИНХРОНИЗАЦИЯ
        function initPlayer(videoId) {
            const parts = videoId.split('_');
            const oid = parts[0];
            const vid = parts[1];

            const container = document.getElementById('vk_player');
            container.innerHTML = ''; // Очищаем контейнер

            // 1. Создаем iframe вручную (это надежнее)
            const iframe = document.createElement('iframe');

            // Формируем правильный адрес встраивания (video_ext.php)
            // Добавляем js_api=1, чтобы библиотека ВК могла им управлять
            iframe.src = `https://vk.com/video_ext.php?oid=${oid}&id=${vid}&js_api=1`;

            iframe.width = "800";
            iframe.height = "450";
            iframe.frameBorder = "0";
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            iframe.id = "vk_iframe"; // Даем ему ID

            container.appendChild(iframe);

            // 2. Инициализируем управление плеером через библиотеку ВК
            // Теперь мы передаем сам iframe, а не настройки
            player = new VK.VideoPlayer(iframe);

            // 3. Вешаем события
            player.on('inited', () => {
                console.log("Плеер успешно инициализирован");

                player.on('started', () => sendSync('play'));
                player.on('resumed', () => sendSync('play'));
                player.on('paused', () => sendSync('pause'));
            });
        }

        // Функция отправки сигнала другому человеку
        function sendSync(action) {
            socket.emit('playerEvent', {
                roomId: roomId,
                action: action,
                time: player.getCurrentTime()
            });
        }

        // 3. ЧАТ (Логика отправки)
        function sendMessage() {
            const msgInput = document.getElementById('msgInput');
            const msg = msgInput.value;
            if (msg.trim() !== "") {
                socket.emit('message', { roomId: roomId, text: msg });
                msgInput.value = '';
            }
        }

        // 4. ПРИЕМ СОБЫТИЙ (от другого человека)
        socket.on('playerEvent', (data) => {
            if (data.action === 'changeVideo') {
                initPlayer(data.videoId);
            }
            if (player) {
                if (data.action === 'play') player.play();
                if (data.action === 'pause') player.pause();
            }
        });

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight; // Прокрутка вниз
        });

        // Отправка чата по кнопке Enter
        document.getElementById('msgInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
