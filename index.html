<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
        }

        #app-root {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: #111;
            position: relative;
        }

        /* ПАНЕЛЬ ВВОДА (СВЕРХУ) */
        .top-bar {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            align-items: center;
        }

        .top-bar input {
            flex-grow: 1;
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* БЛОК ВИДЕО (16:9) */
        .video-box {
            width: 100%;
            background: #000;
            flex-shrink: 0;
        }

        .video-ratio {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
        }

        /* ФИКС ДЛЯ ИЗОБРАЖЕНИЯ: iframe должен быть на весь блок */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }

        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            cursor: pointer;
        }

        /* ЧАТ */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #121212;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            background: #262626;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            align-self: flex-start;
            max-width: 85%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 6px;
            font-size: 12px;
        }

        /* ВВОД СООБЩЕНИЯ (ВНИЗУ) */
        .footer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        #msgInput {
            flex-grow: 1;
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            font-size: 16px;
        }

        .send-btn {
            background: #2ea043;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            flex-shrink: 0;
        }

        #status-info {
            font-size: 10px;
            text-align: center;
            color: #555;
            padding: 2px;
        }
    </style>
</head>

<body>

    <div id="app-root">
        <div id="status-info">Загрузка...</div>

        <div class="top-bar">
            <input type="text" id="vkLink" placeholder="Ссылка на видео ВК">
            <button class="btn" onclick="loadVideo()" style="background: #4c75a3; color: white;">OK</button>
            <button id="hostBtn" class="btn" onclick="setMeAsHost()" style="background: #444; color: white;">👑</button>
        </div>

        <div class="video-box">
            <div class="video-ratio">
                <div id="mobile-overlay" onclick="activateMobilePlayer()">
                    <div>🍿 Нажми для синхронизации</div>
                </div>
                <div id="player-container" style="width:100%; height:100%;"></div>
            </div>
        </div>

        <div id="chat"></div>

        <div class="footer">
            <input type="text" id="msgInput" placeholder="Написать сообщение...">
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        /* ФИКС ДЛЯ АЙФОНА (ВЫСОТА И СКРОЛЛ) */
        function syncHeight() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.getElementById('app-root').style.height = vh + 'px';
            window.scrollTo(0, 0);
        }
        if (window.visualViewport) window.visualViewport.addEventListener('resize', syncHeight);
        window.addEventListener('load', syncHeight);

        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');
        let player = null, isHost = false, currentVideoId = "", hostActualState = 'pause';

        socket.on('connect', () => {
            document.getElementById('status-info').innerText = "✅ Подключено: " + roomId;
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            document.getElementById('hostBtn').style.background = "orange";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('player-container');
            const parts = videoId.split('_');

            const iframe = document.createElement('iframe');
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";

            container.innerHTML = '';
            container.appendChild(iframe);

            if (!isHost) document.getElementById('mobile-overlay').style.display = 'flex';

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendSync('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendSync('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 600);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendSync(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', { roomId, action, time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState });
        }

        setInterval(() => {
            if (isHost && player) sendSync('syncTime');
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') {
                if (data.videoId !== currentVideoId) initPlayer(data.videoId, data.time);
                return;
            }
            if (player) {
                if (data.state === 'play') player.play();
                else if (data.state === 'pause') player.pause();
                if (Math.abs(player.getCurrentTime() - data.time) > 3) player.seek(data.time);
            }
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
