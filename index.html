<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #video-container {
            width: 800px;
            height: 450px;
            background: #000;
            margin-top: 20px;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        #chat {
            width: 800px;
            height: 150px;
            border: 1px solid #444;
            overflow-y: scroll;
            margin-top: 10px;
            padding: 10px;
            background: #222;
        }

        .chat-input {
            width: 800px;
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <h2>Смотрим ВК вместе</h2>

    <div class="controls">
        <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
        <button onclick="loadVideo()">Загрузить видео</button>
    </div>

    <div id="video-container">
        <!-- Сюда вставится плеер ВК -->
        <div id="vk_player"></div>
    </div>

    <div id="chat"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const socket = io('https://nrave.onrender.com'); // Например, localhost:3000
        const roomId = new URLSearchParams(window.location.search).get('room') || 'main';
        socket.emit('joinRoom', roomId);

        let player;

        // Функция парсинга ссылки ВК для получения ID видео
        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            // Исправленное регулярное выражение, которое понимает и m.vkvideo.ru и vk.com
            const match = link.match(/video(-?\d+_\d+)/);

            if (match) {
                const videoId = match[1]; // Получим что-то вроде -56169357_456266703
                console.log("ID видео найден:", videoId);
                initPlayer(videoId);

                // Отправляем всем в комнате, что мы сменили видео
                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'changeVideo',
                    videoId: videoId
                });
            } else {
                alert("Неверная ссылка на видео ВК. Убедитесь, что в ссылке есть слово 'video' и цифры.");
            }
        }

        function initPlayer(videoId) {
            const parts = videoId.split('_');
            const oid = parts[0];
            const vid = parts[1];

            const container = document.getElementById('vk_player');
            container.innerHTML = ''; // Очищаем старое видео

            // Создаем плеер
            player = new VK.VideoPlayer(container, {
                oid: oid,
                id: vid,
                width: "100%", // Растянуть на всю ширину
                height: 450,
                autoplay: 1
            });

            // Слушаем события (когда плеер будет готов)
            player.on('inited', () => {
                console.log("Плеер готов к работе");
            });
        }

        // Добавим в обработчик socket.on('playerEvent') поддержку смены видео:
        socket.on('playerEvent', (data) => {
            if (data.action === 'changeVideo') {
                initPlayer(data.videoId);
            }
            if (player) {
                if (data.action === 'play') player.play();
                if (data.action === 'pause') player.pause();
            }
        });
    </script>
</body>

</html>
