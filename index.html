<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Together Watch</title>

    <!-- Подключение библиотек -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>

    <style>
        /* --- 1. ГЛОБАЛЬНЫЕ СТИЛИ --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
            /* Блокировка скролла всей страницы */
        }

        #app-root {
            display: flex;
            width: 100%;
            height: 100%;
            background: #111;
            position: relative;
        }

        /* --- 2. ЛЕВАЯ ЧАСТЬ: ВИДЕО И УПРАВЛЕНИЕ --- */
        .main-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background: #000;
        }

        #status-info {
            font-size: 10px;
            text-align: center;
            color: #555;
            padding: 4px;
            background: #000;
        }

        .top-bar {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            align-items: center;
        }

        .top-bar input {
            flex-grow: 1;
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .video-box {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .video-ratio {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
            max-height: 100%;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            cursor: pointer;
        }

        /* --- 3. ПРАВАЯ ЧАСТЬ: ЧАТ --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
            border-left: 1px solid #333;
            flex-shrink: 0;
        }

        #chat {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #121212;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            background: #262626;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            align-self: flex-start;
            max-width: 90%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 6px;
            font-size: 12px;
            display: block;
        }

        .footer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            border-top: 1px solid #333;
        }

        #msgInput {
            flex-grow: 1;
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            font-size: 16px;
        }

        .send-btn {
            background: #2ea043;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            flex-shrink: 0;
        }

        /* --- 4. АДАПТИВНОСТЬ (ПК vs ТЕЛЕФОН) --- */

        /* Для компьютеров и ноутбуков */
        @media (min-width: 901px) {
            #app-root {
                flex-direction: row;
            }

            .sidebar {
                width: 350px;
            }

            #status-info {
                display: block;
            }
        }

        /* Для телефонов */
        @media (max-width: 900px) {
            #app-root {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-grow: 1;
                border-left: none;
                border-top: 1px solid #333;
            }

            .top-bar {
                display: none;
            }

            /* Скрываем ввод ссылки на телефонах для места */
            .video-box {
                flex-grow: 0;
            }

            /* Видео не растягивается, а держит пропорцию */
            #status-info {
                display: none;
            }

            .footer {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<body>

    <div id="app-root">
        <!-- ЛЕВАЯ ПАНЕЛЬ: ВИДЕО -->
        <div class="main-content">
            <div id="status-info">Загрузка...</div>

            <div class="top-bar">
                <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
                <button class="btn" onclick="loadVideo()" style="background: #4c75a3; color: white;">OK</button>
                <button id="hostBtn" class="btn" onclick="setMeAsHost()"
                    style="background: #444; color: white;">👑</button>
            </div>

            <div class="video-box">
                <div class="video-ratio">
                    <div id="mobile-overlay" onclick="activateMobilePlayer()">
                        <div>🍿 Видео готово!<br><small>Нажми для синхронизации</small></div>
                    </div>
                    <div id="player-container" style="width:100%; height:100%;"></div>
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ: ЧАТ -->
        <div class="sidebar">
            <div id="chat"></div>
            <div class="footer">
                <input type="text" id="msgInput" placeholder="Написать сообщение...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        /* 1. ФИКСЫ IPHONE */
        if (window.visualViewport) {
            const iosFix = () => {
                document.getElementById('app-root').style.height = window.visualViewport.height + 'px';
                window.scrollTo(0, 0);
                const chat = document.getElementById('chat');
                if (chat) chat.scrollTop = chat.scrollHeight;
            };
            window.visualViewport.addEventListener('resize', iosFix);
            window.visualViewport.addEventListener('scroll', iosFix);
            window.addEventListener('load', iosFix);
        }

        /* 2. СЕРВЕР */
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');
        let player = null, isHost = false, currentVideoId = "", hostActualState = 'pause';

        socket.on('connect', () => {
            document.getElementById('status-info').innerText = "✅ Подключено: " + roomId;
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            document.getElementById('hostBtn').style.background = "orange";
            document.getElementById('status-info').innerText = "⭐ Вы хозяин";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                hostActualState = 'play';
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        /* 3. ПЛЕЕР И ПАУЗА (ИСПРАВЛЕНО) */
        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('player-container');
            const parts = videoId.split('_');
            const iframe = document.createElement('iframe');
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            container.innerHTML = '';
            container.appendChild(iframe);

            if (!isHost) document.getElementById('mobile-overlay').style.display = 'flex';

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);

                        // Слушаем события плеера у хозяина
                        player.on('started', () => { if (isHost) { hostActualState = 'play'; sendSync('play'); } });
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendSync('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendSync('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 600);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendSync(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', {
                roomId, action,
                time: player.getCurrentTime(),
                videoId: currentVideoId,
                state: hostActualState
            });
        }

        // Каждые 2 секунды шлем статус (плей или пауза)
        setInterval(() => {
            if (isHost && player) sendSync('syncTime');
        }, 2000);

        /* ПРИЕМ КОМАНД (ИСПРАВЛЕНО) */
        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') {
                if (data.videoId !== currentVideoId) initPlayer(data.videoId, data.time);
                return;
            }
            if (player) {
                // Если статус хозяина - PLAY, а у нас пауза - запускаем
                if (data.state === 'play') {
                    player.play();
                }
                // Если статус хозяина - PAUSE, а мы играем - останавливаем
                else if (data.state === 'pause') {
                    player.pause();
                }

                // Синхронизация времени
                let myTime = player.getCurrentTime();
                if (Math.abs(myTime - data.time) > 3) {
                    player.seek(data.time);
                }
            }
        });

        /* 4. ЧАТ */
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId, text: input.value });
                input.value = '';
            }
        }
        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });
        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
