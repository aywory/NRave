<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #video-container {
            width: 800px;
            height: 450px;
            background: #000;
            margin-top: 20px;
            border: 2px solid #333;
        }

        .controls {
            margin: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }

        .btn-load {
            background: #4c75a3;
            color: white;
        }

        .btn-host {
            background: orange;
            color: black;
        }

        #chat {
            width: 800px;
            height: 150px;
            border: 1px solid #444;
            overflow-y: scroll;
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 5px;
        }

        .chat-input {
            width: 800px;
            display: flex;
            margin-top: 5px;
            gap: 5px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        @media (max-width: 820px) {

            #video-container,
            #chat,
            .chat-input {
                width: 95vw;
                height: auto;
            }

            #video-container {
                height: 250px;
            }
        }
    </style>
</head>

<body>

    <h2>Смотрим ВК вместе</h2>

    <div id="status" style="color: gray;">Подключение к серверу...</div>

    <div class="controls">
        <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
        <button class="btn-load" onclick="loadVideo()">Загрузить видео</button>
        <button class="btn-host" onclick="setMeAsHost()">Я ХОЗЯИН</button>
    </div>

    <div id="video-container">
        <div id="vk_player"></div>
    </div>

    <div id="chat"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Введите сообщение...">
        <button onclick="sendMessage()" style="background: #4caf50; color: white;">Отправить</button>
    </div>

    <script>
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');

        let player = null;
        let isHost = false;
        let currentVideoId = ""; // Храним тут текущее видео

        socket.on('connect', () => {
            document.getElementById('status').innerText = "✅ Подключено. Комната: " + roomId;
            document.getElementById('status').style.color = "green";
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            document.getElementById('status').innerText = "⭐ ВЫ ХОЗЯИН (Управляете всеми)";
            document.getElementById('status').style.color = "gold";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);

            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                initPlayer(currentVideoId);

                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'changeVideo',
                    videoId: currentVideoId,
                    time: 0
                });
            } else {
                alert("Ошибка в ссылке!");
            }
        }

        function initPlayer(videoId, startTime = 0) {
            const container = document.getElementById('vk_player');
            container.innerHTML = '';
            const playerDiv = document.createElement('div');
            container.appendChild(playerDiv);

            const parts = videoId.split('_');
            player = new VK.VideoPlayer(playerDiv, {
                oid: parts[0], id: parts[1], width: "100%", height: 450, autoplay: 1
            });

            player.on('inited', () => {
                if (startTime > 0) player.seek(startTime);

                player.on('resumed', () => { if (isHost) sendEvent('play'); });
                player.on('paused', () => { if (isHost) sendEvent('pause'); });
            });
        }

        function sendEvent(action) {
            if (!isHost || !player || !currentVideoId) return;
            socket.emit('playerEvent', {
                roomId: roomId,
                action: action,
                time: player.getCurrentTime(),
                videoId: currentVideoId
            });
        }

        // Синхронизация от хозяина
        setInterval(() => {
            if (isHost && player) {
                sendEvent('syncTime');
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;

            if (data.action === 'changeVideo' && data.videoId !== currentVideoId) {
                currentVideoId = data.videoId;
                initPlayer(data.videoId, data.time);
            }

            if (player) {
                if (data.action === 'play') player.play();
                if (data.action === 'pause') player.pause();

                let myTime = player.getCurrentTime();
                if (Math.abs(myTime - data.time) > 3) {
                    player.seek(data.time);
                }
            }
        });

        // ЧАТ
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId: roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
