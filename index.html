<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VK Together</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        /* Обнуляем всё и фиксируем высоту экрана */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            color: white;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
            /* Запрещаем скролл всей страницы */
        }

        /* Главный контейнер */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            /* dvh - динамическая высота (фикс для iOS) */
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a1a;
        }

        /* БЛОК ВИДЕО (всегда сверху) */
        .video-box {
            width: 100%;
            flex-shrink: 0;
            background: #000;
            z-index: 10;
        }

        .video-ratio {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            background: #000;
        }

        #vk_player_iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ОВЕРЛЕЙ ДЛЯ МОБИЛ */
        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 11;
            text-align: center;
            cursor: pointer;
        }

        /* УПРАВЛЕНИЕ (под видео) */
        .controls {
            padding: 8px;
            display: flex;
            gap: 6px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .controls input {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
        }

        .controls button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ЧАТ (занимает всё свободное место) */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            background: #121212;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            background: #2c2c2c;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            align-self: flex-start;
            max-width: 85%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 5px;
        }

        /* ВВОД СООБЩЕНИЯ (всегда внизу) */
        .footer {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        #msgInput {
            flex-grow: 1;
            background: #333;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 20px;
            font-size: 16px;
        }

        .btn-send {
            background: #4caf50;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Статус */
        #status-bar {
            font-size: 11px;
            text-align: center;
            color: #666;
            padding: 2px;
        }

        /* Специально для ПК: если экран широкий */
        @media (min-width: 900px) {
            .app-wrapper {
                border-left: 1px solid #333;
                border-right: 1px solid #333;
            }
        }
    </style>
</head>

<body>

    <div class="app-wrapper">
        <div id="status-bar">Загрузка...</div>

        <div class="video-box">
            <div class="video-ratio">
                <div id="mobile-overlay" onclick="activateMobilePlayer()">
                    <div>🍿 Видео готово!<br><small>Нажми здесь для синхронизации</small></div>
                </div>
                <div id="player-container" style="width:100%; height:100%;"></div>
            </div>
            <div class="controls">
                <input type="text" id="vkLink" placeholder="Ссылка на видео ВК">
                <button onclick="loadVideo()" style="background:#4c75a3; color:white;">Загрузить</button>
                <button id="hostBtn" onclick="setMeAsHost()" style="background:#444; color:white;">Я Хозяин</button>
            </div>
        </div>

        <div id="chat"></div>

        <div class="footer">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');
        let player = null;
        let isHost = false;
        let currentVideoId = "";
        let hostActualState = 'pause';

        socket.on('connect', () => {
            document.getElementById('status-bar').innerText = "✅ Комната: " + roomId;
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            const btn = document.getElementById('hostBtn');
            btn.style.background = "orange";
            btn.innerText = "⭐ Я ХОЗЯИН";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('player-container');
            const parts = videoId.split('_');
            const iframe = document.createElement('iframe');
            iframe.id = "vk_player_iframe";
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            container.innerHTML = '';
            container.appendChild(iframe);

            if (!isHost) { document.getElementById('mobile-overlay').style.display = 'flex'; }

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendEvent('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendEvent('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 600);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendEvent(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', {
                roomId, action, time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
            });
        }

        setInterval(() => {
            if (isHost && player) {
                socket.emit('playerEvent', {
                    roomId, action: 'syncTime', time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
                });
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') {
                if (data.videoId !== currentVideoId) initPlayer(data.videoId, data.time);
                return;
            }
            if (player) {
                if (data.state === 'play') player.play();
                else if (data.state === 'pause') player.pause();
                if (Math.abs(player.getCurrentTime() - data.time) > 3) player.seek(data.time);
            }
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
