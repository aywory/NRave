<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #video-container {
            width: 800px;
            height: 450px;
            background: #000;
            margin-top: 20px;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        #chat {
            width: 800px;
            height: 150px;
            border: 1px solid #444;
            overflow-y: scroll;
            margin-top: 10px;
            padding: 10px;
            background: #222;
        }

        .chat-input {
            width: 800px;
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <h2>Смотрим ВК вместе</h2>

    <div class="controls">
        <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
        <button onclick="loadVideo()">Загрузить видео</button>
    </div>

    <div id="video-container">
        <!-- Сюда вставится плеер ВК -->
        <div id="vk_player"></div>
    </div>

    <div id="chat"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        // 1. ПРИДУМАЙ ЛЮБОЕ СВОЕ ИМЯ КОМНАТЫ
        const roomId = 'nrave_private_room_777';

        const socket = io('https://nrave.onrender.com');
        socket.emit('joinRoom', roomId);

        let player = null;
        let isHost = false;

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);

            if (match) {
                const videoId = match[1];
                isHost = true;
                initPlayer(videoId);

                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'changeVideo',
                    videoId: videoId,
                    time: 0
                });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            const parts = videoId.split('_');
            const container = document.getElementById('vk_player');
            container.innerHTML = '';

            const playerDiv = document.createElement('div');
            container.appendChild(playerDiv);

            player = new VK.VideoPlayer(playerDiv, {
                oid: parts[0],
                id: parts[1],
                width: "100%",
                height: 450,
                autoplay: 1
            });

            player.on('inited', () => {
                // Если мы зашли в середину видео, перематываем
                if (startTime > 0) {
                    player.seek(startTime);
                }

                player.on('started', () => { if (isHost) sendEvent('play'); });
                player.on('resumed', () => { if (isHost) sendEvent('play'); });
                player.on('paused', () => { if (isHost) sendEvent('pause'); });
            });
        }

        function sendEvent(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', {
                roomId: roomId,
                action: action,
                time: player.getCurrentTime(),
                videoId: document.getElementById('vkLink').value.match(/video(-?\d+_\d+)/)[1]
            });
        }

        // Каждые 2 секунды Хозяин обновляет время на сервере
        setInterval(() => {
            if (isHost && player) {
                sendEvent('syncTime');
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            // Если пришло новое видео, а у нас его нет или оно другое
            if (data.action === 'changeVideo' || !player) {
                // Если мы только зашли и видео уже идет
                initPlayer(data.videoId, data.time);
            }

            if (player && !isHost) {
                if (data.action === 'play') player.play();
                if (data.action === 'pause') player.pause();

                let myTime = player.getCurrentTime();
                if (Math.abs(myTime - data.time) > 2) {
                    player.seek(data.time);
                }
            }
        });

        // ЧАТ
        function sendMessage() {
            const msgInput = document.getElementById('msgInput');
            if (msgInput.value.trim() !== "") {
                socket.emit('message', { roomId, text: msgInput.value });
                msgInput.value = '';
            }
        }
        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
