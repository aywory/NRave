<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        /* Общие стили */
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            background: #121212;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
            /* Запрещаем общий скролл страницы */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Шапка и статус */
        header {
            padding: 10px;
            text-align: center;
        }

        h2 {
            margin: 0;
            font-size: 18px;
        }

        #status {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        /* Видео */
        #video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            flex-shrink: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Оверлей для мобил */
        #mobile-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        /* Управление */
        .controls {
            padding: 10px;
            display: flex;
            gap: 5px;
            background: #1a1a1a;
            flex-wrap: wrap;
            justify-content: center;
        }

        input,
        button {
            border-radius: 8px;
            border: none;
            padding: 10px;
            font-size: 16px;
            /* 16px - ФИКС ДЛЯ IOS */
        }

        #vkLink {
            flex-grow: 1;
            min-width: 200px;
            background: #333;
            color: white;
        }

        .btn-load {
            background: #4c75a3;
            color: white;
        }

        .btn-host {
            background: #ff9800;
            color: black;
            font-weight: bold;
        }

        /* Чат */
        #chat {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background: #121212;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .msg {
            background: #222;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 14px;
            width: fit-content;
            max-width: 90%;
        }

        .msg b {
            color: #71aaeb;
            margin-right: 5px;
        }

        /* Поле ввода сообщения */
        .chat-input {
            padding: 10px;
            background: #1a1a1a;
            display: flex;
            gap: 8px;
            padding-bottom: env(safe-area-inset-bottom);
            /* Учет челки/полоски на Айфоне */
        }

        #msgInput {
            flex-grow: 1;
            background: #333;
            color: white;
        }

        .btn-send {
            background: #4caf50;
            color: white;
        }

        /* Адаптация под открытую клавиатуру */
        @media (max-height: 450px) {

            h2,
            #status,
            header {
                display: none;
            }

            #video-container {
                width: 40%;
                aspect-ratio: auto;
                height: 100%;
            }

            .app-container {
                flex-direction: row;
                flex-wrap: wrap;
            }

            #chat {
                height: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header>
            <h2>Смотрим вместе</h2>
            <div id="status">Подключение...</div>
        </header>

        <div id="video-container">
            <div id="mobile-overlay" onclick="activateMobilePlayer()">
                <div>🍿 Видео готово!<br><small>Нажми сюда, чтобы синхронизироваться</small></div>
            </div>
            <div id="vk_player" style="width:100%; height:100%;"></div>
        </div>

        <div class="controls">
            <input type="text" id="vkLink" placeholder="Ссылка на видео ВК">
            <button class="btn-load" onclick="loadVideo()">Загрузить</button>
            <button class="btn-host" onclick="setMeAsHost()">Я ХОЗЯИН</button>
        </div>

        <div id="chat"></div>

        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button class="btn-send" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const roomId = 'nrave_private_room_777';
        const socket = io('https://nrave.onrender.com');

        let player = null;
        let isHost = false;
        let currentVideoId = "";
        let hostActualState = 'pause';

        socket.on('connect', () => {
            document.getElementById('status').innerText = "✅ Подключено: " + roomId;
            socket.emit('joinRoom', roomId);
        });

        function setMeAsHost() {
            isHost = true;
            document.getElementById('status').innerText = "⭐ ВЫ ХОЗЯИН (УПРАВЛЯЕТЕ ВСЕМИ)";
            document.getElementById('status').style.color = "gold";
        }

        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);
            if (match) {
                currentVideoId = match[1];
                setMeAsHost();
                hostActualState = 'play';
                initPlayer(currentVideoId);
                socket.emit('playerEvent', { roomId, action: 'changeVideo', videoId: currentVideoId, time: 0, state: 'play' });
            }
        }

        function initPlayer(videoId, startTime = 0) {
            currentVideoId = videoId;
            const container = document.getElementById('vk_player');
            container.innerHTML = '';
            const parts = videoId.split('_');
            const iframe = document.createElement('iframe');
            iframe.src = `https://vk.com/video_ext.php?oid=${parts[0]}&id=${parts[1]}&js_api=1&autoplay=1`;
            iframe.allow = "autoplay; encrypted-media; fullscreen";
            container.appendChild(iframe);

            if (!isHost) { document.getElementById('mobile-overlay').style.display = 'flex'; }

            setTimeout(() => {
                try {
                    player = new VK.VideoPlayer(iframe);
                    player.on('inited', () => {
                        if (startTime > 0) player.seek(startTime);
                        player.on('resumed', () => { if (isHost) { hostActualState = 'play'; sendEvent('play'); } });
                        player.on('paused', () => { if (isHost) { hostActualState = 'pause'; sendEvent('pause'); } });
                    });
                } catch (e) { console.error(e); }
            }, 500);
        }

        function activateMobilePlayer() {
            document.getElementById('mobile-overlay').style.display = 'none';
            if (player) player.play();
        }

        function sendEvent(action) {
            if (!isHost || !player) return;
            socket.emit('playerEvent', {
                roomId: roomId, action: action, time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
            });
        }

        setInterval(() => {
            if (isHost && player) {
                socket.emit('playerEvent', {
                    roomId: roomId, action: 'syncTime', time: player.getCurrentTime(), videoId: currentVideoId, state: hostActualState
                });
            }
        }, 2000);

        socket.on('playerEvent', (data) => {
            if (isHost && data.action !== 'changeVideo') return;
            if (data.action === 'changeVideo') { initPlayer(data.videoId, data.time); return; }
            if (player) {
                if (data.state === 'play') player.play();
                else if (data.state === 'pause') player.pause();
                let myTime = player.getCurrentTime();
                if (Math.abs(myTime - data.time) > 3) player.seek(data.time);
            }
        });

        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() !== "") {
                socket.emit('message', { roomId: roomId, text: input.value });
                input.value = '';
            }
        }

        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg"><b>Аноним:</b>${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
