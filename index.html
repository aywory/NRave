<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>VK Together Watch</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #video-container {
            width: 800px;
            height: 450px;
            background: #000;
            margin-top: 20px;
        }

        .controls {
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        #chat {
            width: 800px;
            height: 150px;
            border: 1px solid #444;
            overflow-y: scroll;
            margin-top: 10px;
            padding: 10px;
            background: #222;
        }

        .chat-input {
            width: 800px;
            display: flex;
        }

        .chat-input input {
            flex-grow: 1;
        }
    </style>
</head>

<body>

    <h2>Смотрим ВК вместе</h2>

    <div class="controls">
        <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
        <button onclick="loadVideo()">Загрузить видео</button>
    </div>

    <div id="video-container">
        <!-- Сюда вставится плеер ВК -->
        <div id="vk_player"></div>
    </div>

    <div id="chat"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const socket = io('https://nrave.onrender.com');
        const roomId = new URLSearchParams(window.location.search).get('room') || 'main';
        socket.emit('joinRoom', roomId);

        let player = null;
        let isHost = false; // По умолчанию мы не хозяин

        // 1. ЗАГРУЗКА ВИДЕО
        function loadVideo() {
            const link = document.getElementById('vkLink').value;
            const match = link.match(/video(-?\d+_\d+)/);

            if (match) {
                const videoId = match[1];
                isHost = true; // Тот, кто нажал кнопку, становится Хозяином

                initPlayer(videoId);

                // Говорим всем сменить видео и назначаем себя главным
                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'changeVideo',
                    videoId: videoId,
                    hostTime: 0
                });
            }
        }

        // 2. ИНИЦИАЛИЗАЦИЯ ПЛЕЕРА
        function initPlayer(videoId) {
            const parts = videoId.split('_');
            const container = document.getElementById('vk_player');
            container.innerHTML = '';

            const playerDiv = document.createElement('div');
            container.appendChild(playerDiv);

            player = new VK.VideoPlayer(playerDiv, {
                oid: parts[0],
                id: parts[1],
                width: "100%",
                height: 450,
                autoplay: 1
            });

            player.on('inited', () => {
                console.log("Плеер готов. Роль Хозяина:", isHost);

                // Только Хозяин отправляет сигналы управления
                player.on('started', () => { if (isHost) sendEvent('play'); });
                player.on('resumed', () => { if (isHost) sendEvent('play'); });
                player.on('paused', () => { if (isHost) sendEvent('pause'); });
            });
        }

        // Функция отправки команд
        function sendEvent(action) {
            if (!isHost) return;
            socket.emit('playerEvent', {
                roomId: roomId,
                action: action,
                time: player.getCurrentTime()
            });
        }

        // 3. СИСТЕМА ЖЕСТКОЙ СИНХРОНИЗАЦИИ (Heartbeat)
        // Каждые 2 секунды Хозяин сообщает всем свое точное время
        setInterval(() => {
            if (isHost && player) {
                socket.emit('playerEvent', {
                    roomId: roomId,
                    action: 'syncTime',
                    time: player.getCurrentTime()
                });
            }
        }, 2000);

        // 4. ПРИЕМ КОМАНД
        socket.on('playerEvent', (data) => {
            if (data.action === 'changeVideo') {
                isHost = false; // Если кто-то другой сменил видео, мы перестаем быть хозяином
                initPlayer(data.videoId);
            }

            if (player && !isHost) { // Слушаемся только если мы не хозяин
                if (data.action === 'play') player.play();
                if (data.action === 'pause') player.pause();

                if (data.action === 'syncTime' || data.action === 'play') {
                    let myTime = player.getCurrentTime();
                    // Если разница больше 1.5 секунд - принудительно перематываем
                    if (Math.abs(myTime - data.time) > 1.5) {
                        console.log("Рассинхрон! Подтягиваюсь к Хозяину...");
                        player.seek(data.time);
                    }
                }
            }
        });

        // ЧАТ (без изменений)
        function sendMessage() {
            const msgInput = document.getElementById('msgInput');
            if (msgInput.value.trim() !== "") {
                socket.emit('message', { roomId, text: msgInput.value });
                msgInput.value = '';
            }
        }
        socket.on('message', (data) => {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>Аноним:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
