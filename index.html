<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Together Watch</title>

    <!-- Подключаем наш файл со стилями -->
    <link rel="stylesheet" href="style.css">

    <!-- Библиотеки -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
</head>

<body>

    <div id="app-root">
        <!-- ЛЕВАЯ ПАНЕЛЬ: ВИДЕО -->
        <div class="main-content">
            <div class="toggle-ui-btn" onclick="toggleTopBar()" id="toggleBtn">▲</div>
            <div id="status-info">Подключение...</div>

            <div class="top-bar" id="topBar">
                <input type="text" id="vkLink" placeholder="Вставьте ссылку на видео ВК">
                <button class="btn btn-ok" onclick="loadVideo()">OK</button>
                <button id="hostBtn" class="btn btn-host" onclick="setMeAsHost()">👑</button>
            </div>

            <div class="video-box">
                <div class="video-ratio">
                    <div id="mobile-overlay" onclick="activateMobilePlayer()">
                        <div>
                            <span style="font-size: 40px;">🍿</span><br>
                            <b>Видео готово!</b><br>
                            <small>Нажми сюда для синхронизации</small>
                        </div>
                    </div>
                    <div id="player-container"></div>
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ: ЧАТ -->
        <div class="sidebar">
            <div id="chat"></div>
            <div id="emojiPicker" class="emoji-picker"></div>
            <div class="footer">
                <button class="emoji-btn" onclick="toggleEmojiPicker()">😀</button>
                <input type="text" id="msgInput" placeholder="Написать в чат...">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Подключаем наш файл с логикой -->
    <script src="script.js"></script>
</body>

</html>
